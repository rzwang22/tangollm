workload:
  mode: synthetic

model:
  memory_tokens: 128
  hidden_dim: 4096
  gnn_heads: 32
  head_dim: 128
  suffix_layers: 6
  text_len: 256
  kv_heads: 8
  kv_bits: 2
  include_scale_metadata: false
  scale_group_channels: 16
  scale_bytes: 2

hbm3:
  num_stacks: 1
  channels_per_stack: 8
  pseudo_channels_per_channel: 2
  banks_per_pseudo_channel: 16
  pe_per_bank: 1

near_bank_pe:
  q8k8_group_cycles: 1
  p8v8_group_cycles: 1
  q8k2_lut_group_cycles: 1
  p8v2_lut_group_cycles: 1
  vadd_group_cycles: 1
  scale_group_cycles: 1
  softmax_group_cycles: 1
  scheduling_overhead_per_tile_cycles: 16
  h100_group_cycles: 1
  h100_cache_bytes_per_cycle: 4096
  h100_int2_unpack_group_cycles: 1
  h100_scale_dequant_group_cycles: 1
  h100_layout_conversion_group_cycles: 1
  h100_irregular_gather_penalty: 1.25
  h100_small_batch_efficiency: 0.50
  clock_ns: 1.0

tile:
  channel_group: 16
  head_tile: 1
  memory_token_tiles: [1, 4, 8]

local_buffer:
  resident_head_tiles: 1
  concurrent_destinations_per_bank: 1
  capacity_bytes_per_bank: 4096

workload_suite:
  full_graph_nodes: 2708
  full_graph_edges: 10556
  num_queries_per_workload: 16
  high_degree_top_percent: 0.05
  seed: 777
  allow_duplicate_edges: false
  workloads:
    - name: smoke
      sampled_nodes: 5
      sampled_edges: 15
      degree_distribution: uniform
      power_law_exponent: 1.2
      destination_skew: 0.0
    - name: small
      sampled_nodes: 16
      sampled_edges: 64
      degree_distribution: uniform
      power_law_exponent: 1.2
      destination_skew: 0.0
    - name: medium
      sampled_nodes: 64
      sampled_edges: 512
      degree_distribution: uniform
      power_law_exponent: 1.2
      destination_skew: 0.0
    - name: large
      sampled_nodes: 128
      sampled_edges: 2048
      degree_distribution: uniform
      power_law_exponent: 1.2
      destination_skew: 0.0
    - name: skewed_high_degree
      sampled_nodes: 128
      sampled_edges: 2048
      degree_distribution: power_law
      power_law_exponent: 1.2
      destination_skew: 1.5

hybrid_placement:
  hot_dst_degree_threshold: 64
  target_edges_per_bank: 32
  max_banks_per_destination: 16
  locality_weight: 0.25
  bank_balance_weight: 1.0
  pseudo_channel_balance_weight: 1.0

communication:
  q_broadcast_bandwidth_bytes_per_cycle_per_bank: 64
  q_broadcast_startup_cycles: 16
  bank_to_pc_bandwidth_bytes_per_cycle_per_bank: 32
  bank_to_pc_startup_cycles: 16
  pc_to_global_bandwidth_bytes_per_cycle_per_pc: 64
  pc_to_global_startup_cycles: 32
  global_to_npu_bandwidth_bytes_per_cycle: 256
  global_to_npu_startup_cycles: 32

reducer:
  pc_lanes_per_pseudo_channel: 16
  pc_throughput_groups_per_cycle_per_lane: 1
  pc_input_bandwidth_bytes_per_cycle: 512
  pc_concurrent_destination_groups: 64
  global_units: 1
  global_lanes_per_unit: 64
  global_throughput_groups_per_cycle_per_lane: 1
  global_input_bandwidth_bytes_per_cycle: 1024
  global_concurrent_destination_groups: 256

graph_compute_placement_sweep:
  - hash
  - degree_balanced
  - source_dst_locality
  - hybrid_locality_balanced

kv_storage_placement_sweep:
  - legacy_graph_coupled

baselines:
  - h100_ideal_compute_only
  - h100_realistic_cache_path
  - pim_selective_kv_no_local_combine
  - pim_selective_kv_local_combine

output:
  per_query_csv: ../data/analytical_pim_per_query.csv
  aggregate_csv: ../data/analytical_pim_aggregate.csv
